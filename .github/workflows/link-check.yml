name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          # linkedin.com is excluded: it returns HTTP 999 to automated/non-browser
          # requests (anti-bot), not a real broken-link signal.
          args: --no-progress --exclude linkedin.com index.html
          fail: true
